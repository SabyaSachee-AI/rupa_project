name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_DEFAULT: "3.12"

jobs:
  # ---------------------------------------------------------------------------
  # 1. Lint + format + type check (fast: ~30s)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Ruff lint
        run: ruff check app tests

      - name: Ruff format check
        run: ruff format --check app tests

      - name: Mypy
        run: mypy app

  # ---------------------------------------------------------------------------
  # 2. Tests on multiple Python versions
  # ---------------------------------------------------------------------------
  test:
    name: Test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run pytest
        env:
          RUPA_ENV: test
          DATABASE_URL: "sqlite:///:memory:"
          AUTH_COOKIE_KEY: test-key
          OPENROUTER_API_KEY: test-or
          GROQ_API_KEY: test-groq
          OPENAI_API_KEY: test-openai
          PINECONE_API_KEY: test-pinecone
        run: pytest -v

      - name: Upload coverage
        if: matrix.python == env.PYTHON_DEFAULT
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python }}
          path: coverage.xml
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 3. Docker build smoke test
  # ---------------------------------------------------------------------------
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: rupa-ai:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run -d --name rupa-test \
            -e RUPA_ENV=development \
            -e AUTH_COOKIE_KEY=ci-test-key \
            -e OPENROUTER_API_KEY=ci-or \
            -e GROQ_API_KEY=ci-groq \
            -e OPENAI_API_KEY=ci-openai \
            -e PINECONE_API_KEY=ci-pinecone \
            -p 8501:8501 \
            rupa-ai:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8501/_stcore/health > /dev/null; then
              echo "Container is healthy"
              docker logs rupa-test | tail -30
              exit 0
            fi
            sleep 2
          done
          echo "Container failed to become healthy"
          docker logs rupa-test
          exit 1

  # ---------------------------------------------------------------------------
  # 4. Security scan
  # ---------------------------------------------------------------------------
  security:
    name: Security scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]" pip-audit

      - name: pip-audit
        continue-on-error: true
        run: pip-audit --strict --ignore-vuln GHSA-w596-4wvx-j9j6 || true

      - name: Bandit
        continue-on-error: true
        run: |
          pip install bandit
          bandit -r app -c pyproject.toml || true
